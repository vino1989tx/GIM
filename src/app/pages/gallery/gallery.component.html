<section class="section">
  <div class="container">
    <header class="section__header">
      <h1>Project gallery</h1>
      <p class="section__sub">A showcase of installations, site deployments, and real-world monitoring environments.</p>
    </header>

    <div class="gallery-grid">
      <div class="gallery-item" *ngFor="let image of paginatedImages">
        <img [src]="image" alt="Gallery image" />
      </div>
    </div>

    <div class="pagination" *ngIf="totalPages > 1">
      <button (click)="prevPage()" [disabled]="currentPage === 1">Previous</button>
      <span *ngFor="let page of [].constructor(totalPages); let i = index">
        <button (click)="goToPage(i + 1)" [class.active]="currentPage === i + 1">{{ i + 1 }}</button>
      </span>
      <button (click)="nextPage()" [disabled]="currentPage === totalPages">Next</button>
    </div>
  </div>
</section>
